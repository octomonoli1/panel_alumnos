<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel alumnos</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <img src="alumno.png"/>
        <h1>Panel Alumnos</h1>
    </header>

    <main>
        <section class="alumnos">
            <article class="column" id="all"> 
                <h2>Alumnos</h2>
                <ul class="lista">
                    <li class="alumno">Alumno1 apellidos1 (5)</li>
                    <li class="alumno">Alumno2 apellidos2 (5)</li>
                    <li class="alumno">Alumno3 apellidos2 (5)</li>
                </ul>
            </article>
            <article class="column" id="selecteds">
                <h2>Seleccionados</h2>
            </article>
        </section>
        <section class="control">
            <button class="btn">Nuevo</button>
            <button class="btn">Enviar</button>
        </section>
        <section id="formulario"></section>
    </main>

    <footer>
        <p>Octavio Montero Oliva. DWECL. 2026</p>
    </footer>
</body>
</html>
