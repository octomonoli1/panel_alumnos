<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel alumnos</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <img src="alumno.png"/>
        <h1>Panel Alumnos</h1>
    </header>

    <main>
        <section class="alumnos">
            <article class="column" id="all"> 
                <h2>Alumnos</h2>
                <ul id="listaAll" class="lista">
                    <li draggable="true" class="alumno">Pepito Martínez (32)</li>
                </ul>
            </article>
            <article class="column" id="selecteds">
                <h2>Seleccionados</h2>
                <ul id="listaSelected" class="lista"></ul>
            </article>
        </section>
        <section class="control">
            <button id="new" class="btn">Nuevo</button>
            <button class="btn">Enviar</button>
        </section>
        <section id="formulario">
            <form id="form">
                <label for="nombre">Nombre: </label>
                <input type="text" id="nombre" /> <br>
                <label for="apellidos">Apellidos: </label>
                <input type="text" id="apellidos" /> <br>
                <label for="edad">Edad: </label>
                <input type="number" id="edad" /> <br>
                <button id="add" class="btn">Añadir</button>
                <input type="reset" class="btn" />
            </form>
        </section>
    </main>

    <footer>
        <p>Octavio Montero Oliva. DWECL. 2026</p>
    </footer>
</body>
</html>
